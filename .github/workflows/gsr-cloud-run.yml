name: GSR Cloud Run

on:
  workflow_dispatch:
  schedule:
    - cron: "0 9 * * *"
    - cron: "0 15 * * *"
    - cron: "0 21 * * *"

permissions:
  contents: write

concurrency:
  group: gsr-cloud-run
  cancel-in-progress: false

jobs:
  run-gsr:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Show repo contents
        run: |
          pwd
          ls -la
          find . -maxdepth 3 -type f | sort

      - name: Verify latest_report.json exists
        run: |
          if [ ! -f public/latest_report.json ]; then
            echo "public/latest_report.json not found"
            exit 1
          fi
          echo "Found public/latest_report.json"

      - name: Commit refreshed files if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/latest_report.json
          git diff --cached --quiet || git commit -m "Auto update GSR site"

      - name: Push changes
        run: |
          git push

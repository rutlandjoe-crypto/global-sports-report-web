name: GSR Morning Run

on:
  workflow_dispatch:
  schedule:
    - cron: "0 5 * * *"
      timezone: "America/New_York"
    - cron: "0 11 * * *"
      timezone: "America/New_York"
    - cron: "0 17 * * *"
      timezone: "America/New_York"

permissions:
  contents: write

concurrency:
  group: gsr-morning-run
  cancel-in-progress: false

jobs:
  run-gsr:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    env:
      PYTHONUNBUFFERED: "1"
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      TWITTER_API_KEY: ${{ secrets.TWITTER_API_KEY }}
      TWITTER_API_SECRET: ${{ secrets.TWITTER_API_SECRET }}
      TWITTER_ACCESS_TOKEN: ${{ secrets.TWITTER_ACCESS_TOKEN }}
      TWITTER_ACCESS_TOKEN_SECRET: ${{ secrets.TWITTER_ACCESS_TOKEN_SECRET }}
      ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
      GSR_DISABLE_SOCIAL_POSTS: "false"

    steps:
      - name: Check out repo
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          else
            pip install requests python-dotenv tweepy
          fi

      - name: Show working directory
        run: |
          pwd
          ls -la
          find . -maxdepth 2 -type f | sort

      - name: Run master runner
        run: |
          echo "SPORTS BLOCK START"
          python master_runner.py
          echo "SPORTS BLOCK FINISH"

      - name: Stage website files
        run: |
          git add public/latest_report.json public/latest_report.txt public/global_sports_report.txt || true

      - name: Commit updated site data if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com}"

          if git diff --cached --quiet; then
            echo "No site-data changes to commit."
          else
            git commit -m "Auto update GSR site data"
          fi

      - name: Push changes
        run: |
          if git diff --cached --quiet && git diff --quiet; then
            echo "Nothing to push."
          else
            git push origin HEAD:master
          fi
